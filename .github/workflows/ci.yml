name: ci

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  windows-build-test:
    name: Windows build, test, and package
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Rust toolchain
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Build release binary
        shell: pwsh
        run: cargo build --release

      - name: Run release tests
        shell: pwsh
        run: cargo test --release -- --nocapture

      - name: Package portable Windows zip
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          $shortSha = if ($sha.Length -ge 7) { $sha.Substring(0, 7) } else { $sha }
          pwsh -ExecutionPolicy Bypass -File ./scripts/package-windows.ps1 -Tag "snapshot-$shortSha"

      - name: Upload packaged snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: es_sim-windows-x64-snapshot
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  docs-pdf:
    name: Build English/Japanese README PDFs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install XeLaTeX and Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-japanese \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-dejavu-core

      - name: Build README PDFs
        run: bash ./scripts/build-doc-pdfs.sh

      - name: Upload README PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: es_sim-docs-pdf-snapshot
          path: dist/docs/*.pdf
          if-no-files-found: error
          retention-days: 14
