# Educational reference case: a high-rev naturally aspirated 2.0 L inline-4.
#
# This file intentionally sits between catalog data and a reduced-order reference model:
# - bore / stroke remain square at 86 x 86 mm so the displacement is about 1.998 L
# - the redline-side operating window is extended toward 8,600 rpm to resemble a high-speed naturally aspirated performance-engine case
# - volumetric-efficiency and wave-action parameters are biased toward a modest high-rpm ram effect
# - the goal is a physically plausible dyno-style brake curve
#   that rises through the mid-range and peaks in the upper-speed band like the attached reference
#   image
#
# Intended literature / catalog anchors for this reference case are documented in
# `docs/MODEL_REFERENCE*.md` and `docs/USER_MANUAL*.md`.

environment:
  ambient_pressure_pa: 101325.0
  intake_temp_k: 300.0
  exhaust_temp_k: 900.0
  dt: 0.0012

engine:
  compression_ratio: 11.8
  bore_m: 0.0860
  stroke_m: 0.0860
  inertia_kgm2: 0.19
  friction_c0_nm: 9.0
  friction_c1_nms: 0.0100
  friction_c2_nms2: 0.000090
  intake_volume_m3: 0.0038
  intake_runner_volume_m3: 0.00046
  exhaust_volume_m3: 0.0056
  exhaust_runner_volume_m3: 0.00060
  throttle_area_max_m2: 0.0034
  tailpipe_area_m2: 0.0027
  default_target_rpm: 900.0
  max_rpm: 8600.0

cam:
  intake_centerline_deg: 468.0
  exhaust_centerline_deg: 248.0
  intake_duration_deg: 252.0
  exhaust_duration_deg: 248.0
  intake_max_lift_mm: 10.8
  exhaust_max_lift_mm: 10.0

control_defaults:
  ignition_timing_deg: 22.0
  vvt_intake_deg: 10.0
  vvt_exhaust_deg: -6.0

model:
  initial_intake_pressure_pa: 100000.0
  initial_throttle_eff: 0.10
  mbt_base_deg: 23.0
  mbt_rpm_slope_deg_per_rpm: 0.0010
  mbt_rpm_reference: 1000.0
  mbt_load_coeff: 5.0
  mbt_min_deg: 10.0
  mbt_max_deg: 34.0
  combustion_pressure_gain: 3.55
  combustion_efficiency: 0.965
  burn_start_base_deg: 348.0
  burn_start_vvt_intake_coeff: 0.16
  burn_duration_base_deg: 56.0
  burn_duration_throttle_coeff: 16.0
  burn_duration_min_deg: 34.0
  burn_duration_max_deg: 82.0
  wiebe_a: 5.5
  wiebe_m: 2.1
  lambda_base: 0.96
  lambda_throttle_coeff: -0.08
  lambda_min: 0.88
  lambda_max: 1.02
  eta_base_offset: 0.44
  eta_load_coeff: 0.15
  eta_rpm_abs_coeff: 0.000045
  eta_rpm_reference: 5200.0
  eta_base_min: 0.30
  eta_base_max: 0.50
  heat_transfer:
    base_h_w_m2k: 125.0
    gas_temp_rise_gain: 0.32
    heat_loss_fraction_max: 0.08
  volumetric_efficiency:
    rpm_base: 0.80
    rpm_gain: 0.36
    rpm_center: 6400.0
    rpm_width: 7.5e6
    rpm_min: 0.70
    rpm_max: 1.08
    throttle_base: 0.44
    throttle_gain: 0.58
    throttle_min: 0.44
    throttle_max: 1.06
    overall_min: 0.36
    overall_max: 1.12
  gas_path:
    intake_runner_length_m: 0.36
    exhaust_runner_length_m: 0.82
    intake_runner_diameter_m: 0.035
    exhaust_runner_diameter_m: 0.038
    intake_runner_friction_factor: 0.028
    exhaust_runner_friction_factor: 0.032
  wave_action:
    intake_runner_length_m: 0.36
    exhaust_primary_length_m: 0.82
    intake_pressure_gain: 0.05
    exhaust_pressure_gain: 0.06
    intake_ram_gain: 0.18
    exhaust_scavenge_gain: 0.12
  external_load:
    mode: brake_map
    base_torque_nm: 30.0
    speed_linear_nms: 0.010
    speed_quadratic_nms2: 0.00012
    torque_min_nm: 0.0
    torque_max_nm: 320.0
    absorber_power_limit_kw: 220.0
