# Runtime configuration for the engine simulator.
# Unit suffixes are part of the key names: _pa, _k, _deg, _m3, _nm, _hz, etc.

# Global environment and integration baseline.
environment:
  # Ambient boundary pressure used as the intake upstream and tailpipe downstream pressure [Pa].
  ambient_pressure_pa: 101325.0
  # Intake control-volume temperature used in ideal-gas density and throttle-flow calculations [K].
  intake_temp_k: 305.0
  # Base exhaust-gas temperature before ignition-phasing corrections are applied [K].
  exhaust_temp_k: 880.0
  # Base simulation timestep before the RPM-linked timestep controller reshapes it [s].
  dt: 0.001

# Lumped engine hardware parameters.
engine:
  # This simulator is calibrated and implemented as a fixed 4-cylinder engine.
  # Geometric compression ratio [-].
  compression_ratio: 13.0
  # Cylinder bore used in the heat-transfer surface-area and mean-piston-speed model [m].
  bore_m: 0.0805
  # Crank stroke used in the heat-transfer and piston-speed model [m].
  stroke_m: 0.0976
  # Total displacement is derived at runtime from 4 * pi/4 * bore^2 * stroke [m^3].
  # Lumped rotational inertia of crankshaft plus driveline surrogate [kg m^2].
  inertia_kgm2: 0.16
  # Constant friction torque term [Nm].
  friction_c0_nm: 5.1
  # Linear friction coefficient multiplying angular speed [N m s/rad].
  friction_c1_nms: 0.0040
  # Quadratic friction coefficient multiplying angular-speed squared [N m s^2/rad^2].
  friction_c2_nms2: 0.000020
  # Intake manifold control-volume size used in the pressure ODE [m^3].
  intake_volume_m3: 0.0032
  # Intake runner / port control-volume size between plenum and cylinder [m^3].
  intake_runner_volume_m3: 0.00040
  # Exhaust manifold / header lumped control-volume size used in the pressure ODE [m^3].
  exhaust_volume_m3: 0.0050
  # Exhaust runner / header-primary control-volume size between cylinder and collector [m^3].
  exhaust_runner_volume_m3: 0.00055
  # Maximum effective throttle opening area before nonlinear pedal-to-area shaping [m^2].
  throttle_area_max_m2: 0.0030
  # Effective tailpipe flow area used in the exhaust discharge model [m^2].
  tailpipe_area_m2: 0.0025
  # Idle target for auto-start / idle control and idle-state checks [rpm].
  idle_target_rpm: 850.0
  # Fixed top of the RPM plot and overall operating-speed reference [rpm].
  max_rpm: 7000.0

# Camshaft geometry used for visualization and VVT-sensitive submodels.
cam:
  # Intake lobe centerline over the 720 deg four-stroke cycle [degCA].
  intake_centerline_deg: 470.0
  # Exhaust lobe centerline over the 720 deg four-stroke cycle [degCA].
  exhaust_centerline_deg: 250.0
  # Intake valve event duration used in the cam-visualization lobe shape [degCA].
  intake_duration_deg: 248.0
  # Exhaust valve event duration used in the cam-visualization lobe shape [degCA].
  exhaust_duration_deg: 244.0
  # Peak intake valve lift shown in the cam plot [mm].
  intake_max_lift_mm: 10.5
  # Peak exhaust valve lift shown in the cam plot [mm].
  exhaust_max_lift_mm: 9.8
  # Fixed y-axis limit for the cam-lift plot [mm].
  display_y_max_mm: 14.0

# Exhaust-audio synthesis controls.
audio:
  # Final master gain applied after the internal loudness model [-].
  output_gain: 0.0
  # Audio sample rate used by the synthesizer [Hz].
  sample_rate_hz: 48000
  # Low-level synthesis model coefficients.
  model:
    # Minimum allowed digital resonator center frequency [Hz].
    resonator_freq_min_hz: 20.0
    # Maximum resonator frequency as a fraction of Nyquist [-].
    resonator_freq_max_nyquist_ratio: 0.45
    # Lower clamp for resonator Q values [-].
    resonator_q_min: 0.2
    # RPM below which the audio gate is fully closed [rpm].
    rpm_gate_floor_rpm: 0.0
    # RPM at which the audio gate reaches full scale [rpm].
    rpm_gate_full_rpm: 450.0
    # Curvature exponent for the RPM gate transition [-].
    rpm_gate_exponent: 1.6
    # Lower clamp for exhaust temperature in acoustic resonance calculations [K].
    exhaust_temp_min_k: 450.0
    # Upper clamp for exhaust temperature in acoustic resonance calculations [K].
    exhaust_temp_max_k: 1900.0
    # Effective quarter-wave exhaust-pipe length for resonance estimation [m].
    exhaust_pipe_length_m: 1.70
    # Multiplier for the first acoustic resonator mode relative to the quarter-wave base [-].
    resonator_mode_1: 1.0
    # Multiplier for the second acoustic resonator mode relative to the quarter-wave base [-].
    resonator_mode_2: 3.0
    # Multiplier for the third acoustic resonator mode relative to the quarter-wave base [-].
    resonator_mode_3: 5.0
    # Ambient reference pressure used to normalize exhaust pressure for audio [kPa].
    ambient_pressure_kpa: 101.325
    # Exhaust-pressure span mapped into the normalized audio pressure variable [kPa].
    pressure_span_kpa: 80.0
    # First-order smoothing gain applied to normalized exhaust pressure [-].
    pressure_smoothing_alpha: 0.0018
    # Mix weight of the exhaust runner pressure in the pulse excitation [-].
    runner_pressure_mix: 1.05
    # Mix weight of the exhaust collector pressure in the pulse excitation [-].
    collector_pressure_mix: 0.55
    # Mix weight of the intake-runner vacuum signal in the pulse excitation [-].
    intake_pressure_mix: 0.18
    # Flow magnitude corresponding to a normalized exhaust-flow excitation of 1.0 [g/s].
    flow_span_gps: 75.0
    # Gain from exhaust runner mass-flow magnitude into the pulse envelope [-].
    flow_pulse_gain: 0.42
    # Number of audio samples between resonator retuning passes [-].
    resonator_retarget_interval: 256
    # Q value for resonator 1 [-].
    resonator_1_q: 2.4
    # Q value for resonator 2 [-].
    resonator_2_q: 3.6
    # Q value for resonator 3 [-].
    resonator_3_q: 5.0
    # Envelope decay factor for exhaust-event energy [-].
    pulse_env_decay: 0.991
    # Gain from positive pressure slope into the pulse envelope [-].
    pulse_env_dp_gain: 30.0
    # Lower clamp for the pulse envelope state [-].
    pulse_env_min: 0.0
    # Upper clamp for the pulse envelope state [-].
    pulse_env_max: 2.0
    # Fast exponential constant of the synthetic exhaust pulse kernel [-].
    pulse_shape_decay_fast: 28.0
    # Slow exponential constant of the synthetic exhaust pulse kernel [-].
    pulse_shape_decay_slow: 140.0
    # Gain applied to the pressure-derivative click term [-].
    pressure_pulse_gain: 60.0
    # Lower clamp for the pressure-derivative click term [-].
    pressure_pulse_min: -2.2
    # Upper clamp for the pressure-derivative click term [-].
    pressure_pulse_max: 2.2
    # Constant amplitude added to each synthetic exhaust pulse [-].
    exhaust_pulse_base: 0.10
    # Pressure-dependent gain added to each synthetic exhaust pulse [-].
    exhaust_pulse_gain: 1.15
    # Small sinusoidal support mixed into the excitation at firing frequency [-].
    pulse_sine_gain: 0.018
    # Direct dry pulse mixed around the resonators to preserve clear pitch cues [-].
    direct_pulse_mix: 0.18
    # Mix weight of resonator 1 in the final audio sum [-].
    resonator_mix_1: 0.95
    # Mix weight of resonator 2 in the final audio sum [-].
    resonator_mix_2: 0.55
    # Mix weight of resonator 3 in the final audio sum [-].
    resonator_mix_3: 0.24
    # Gain of the low-frequency rumble component [-].
    rumble_gain: 0.06
    # Rumble frequency expressed as a fraction of firing-phase rate [-].
    rumble_harmonic: 0.5
    # State-decay term of the one-pole DC blocker [-].
    dc_filter_decay: 0.996
    # Input gain of the one-pole DC blocker [-].
    dc_filter_input_gain: 0.004
    # Base loudness term before pressure / envelope modulation [-].
    loudness_base: 0.22
    # Loudness gain from smoothed normalized exhaust pressure [-].
    loudness_pressure_gain: 0.90
    # Loudness gain from the transient envelope [-].
    loudness_env_gain: 0.08
    # Blend factor from raw model loudness toward automatic loudness normalization [-].
    loudness_normalize_mix: 0.80
    # Target absolute raw-signal level used by the automatic loudness normalizer [-].
    loudness_target_level: 0.16
    # Minimum tracked signal level used to avoid runaway normalization gain [-].
    loudness_level_floor: 0.01
    # Attack coefficient of the audio loudness envelope follower [-].
    loudness_env_attack: 0.020
    # Release coefficient of the audio loudness envelope follower [-].
    loudness_env_release: 0.0015
    # Smoothing factor applied to the automatic normalization gain [-].
    loudness_gain_smoothing: 0.020
    # Minimum gain multiplier allowed from the loudness normalizer [-].
    loudness_normalize_gain_min: 0.25
    # Maximum gain multiplier allowed from the loudness normalizer [-].
    loudness_normalize_gain_max: 4.00
    # Lower floor on the top-level output gain to avoid accidental zeroing [-].
    output_gain_floor: 0.1
    # Final output scale after tanh limiting [-].
    limiter_out_gain: 0.95

# Initial operator commands when the simulator starts.
control_defaults:
  # Initial throttle command sent to the throttle actuator [0..1].
  throttle_cmd: 0.05
  # Initial external-load command applied to the dyno / vehicle-load surrogate [0..1].
  load_cmd: 0.0
  # Initial starter-motor command [bool].
  starter_cmd: false
  # Initial ignition command [bool].
  spark_cmd: false
  # Initial fuel-enable command [bool].
  fuel_cmd: false
  # Initial ignition timing command referenced in deg BTDC [deg].
  ignition_timing_deg: 12.0
  # Initial intake-cam VVT offset [degCA].
  vvt_intake_deg: 0.0
  # Initial exhaust-cam VVT offset [degCA].
  vvt_exhaust_deg: 0.0

# Auto-start and idle-hold controller gains and limits.
auto_control:
  # RPM below which the controller treats the engine as cranking [rpm].
  cranking_rpm_threshold: 600.0
  # RPM above which the starter command is cut even in auto mode [rpm].
  starter_cutoff_rpm: 760.0
  # RPM target while the starter is still engaged [rpm].
  starter_target_rpm: 620.0
  # Proportional gain used while cranking [-].
  starter_kp: 0.00022
  # Integral gain used while cranking [-].
  starter_ki: 0.00008
  # Base throttle bias used while cranking [-].
  starter_base_throttle: 0.14
  # Proportional gain used after the engine is considered running [-].
  run_kp: 0.00012
  # Integral gain used after the engine is considered running [-].
  run_ki: 0.00005
  # Base throttle bias used during idle control [-].
  run_base_throttle: 0.040
  # Lower clamp on the auto-controller integral state [-].
  integral_min: -600.0
  # Upper clamp on the auto-controller integral state [-].
  integral_max: 600.0
  # Minimum throttle command the auto-controller may issue [-].
  throttle_min: 0.005
  # Maximum throttle command the auto-controller may issue [-].
  throttle_max: 0.42
  # RPM overshoot band that triggers integral relief [rpm].
  integral_relief_rpm_band: 120.0
  # Multiplier applied to the integral state when overspeed relief activates [-].
  integral_relief_factor: 0.85
  # Throttle command forced by the WOT thermal-efficiency search mode [-].
  wot_target_throttle: 1.0
  # Minimum RPM before the WOT search starts evaluating candidate points [rpm].
  wot_search_min_rpm: 900.0
  # Time spent averaging indicated efficiency at each candidate operating point [s].
  wot_search_eval_time_s: 0.20
  # Minimum indicated-efficiency gain required before a candidate point is accepted [-].
  wot_search_min_improvement: 0.002
  # Ignition timing step used by the WOT efficiency hill-climber [deg BTDC].
  wot_search_ignition_step_deg: 2.5
  # Intake-cam VVT step used by the WOT efficiency hill-climber [degCA].
  wot_search_vvt_intake_step_deg: 4.0
  # Exhaust-cam VVT step used by the WOT efficiency hill-climber [degCA].
  wot_search_vvt_exhaust_step_deg: 4.0
  # Lower clamp on VVT commands issued by the WOT efficiency hill-climber [degCA].
  wot_search_vvt_min_deg: -40.0
  # Upper clamp on VVT commands issued by the WOT efficiency hill-climber [degCA].
  wot_search_vvt_max_deg: 40.0

# Reduced-order engine-model coefficients and guards.
model:
  # Initial intake-manifold pressure used at startup [Pa].
  initial_intake_pressure_pa: 38000.0
  # Initial effective throttle state before actuator lag evolves it [0..1].
  initial_throttle_eff: 0.05
  # Minimum allowed effective max-RPM reference when the engine config is too small [rpm].
  max_rpm_floor: 1000.0
  # Minimum history-buffer capacity for GUI traces [-].
  history_capacity_floor: 256
  # Number of completed-cycle metrics retained for rolling averages [-].
  cycle_metric_history_capacity: 16
  # Scale factor mapping p-V subsampling into p-V history capacity [-].
  pv_capacity_scale: 1600
  # Absolute minimum p-V history capacity [-].
  pv_capacity_min: 2000
  # Minimum raw p-V samples required before angle-bin averaging is attempted [-].
  pv_display_raw_min_points: 128
  # Number of crank-angle bins used for p-V display smoothing across 720 deg [-].
  pv_display_bins: 1440
  # Minimum populated p-V bins needed before using the smoothed loop [-].
  pv_display_min_populated_bins: 180
  # Lower clamp on commanded ignition timing [deg BTDC].
  ignition_timing_min_deg: -5.0
  # Upper clamp on commanded ignition timing [deg BTDC].
  ignition_timing_max_deg: 45.0
  # Base MBT timing estimate near the reference RPM and full load [deg BTDC].
  mbt_base_deg: 12.0
  # MBT advance increase per RPM relative to the reference operating point [deg/rpm].
  mbt_rpm_slope_deg_per_rpm: 0.0018
  # Reference RPM for the MBT timing map [rpm].
  mbt_rpm_reference: 900.0
  # MBT retard amount applied as load falls away from full load [deg].
  mbt_load_coeff: 3.0
  # Lower clamp on the MBT timing estimate [deg BTDC].
  mbt_min_deg: 8.0
  # Upper clamp on the MBT timing estimate [deg BTDC].
  mbt_max_deg: 26.0
  # Width of the efficiency penalty for overly advanced ignition [deg].
  phase_sigma_advanced_deg: 6.5
  # Width of the efficiency penalty for retarded ignition [deg].
  phase_sigma_retarded_deg: 15.0
  # Largest allowed advance error before combustion is considered unstable [deg].
  phase_stable_advanced_limit_deg: 14.0
  # Largest allowed retard error before combustion is considered unstable [deg].
  phase_stable_retarded_limit_deg: 32.0
  # Exhaust-temperature gain for retarded ignition relative to MBT [- per deg].
  exhaust_temp_retard_gain: 0.024
  # Exhaust-temperature reduction gain for advanced ignition relative to MBT [- per deg].
  exhaust_temp_advance_gain: 0.010
  # Minimum exhaust-temperature scale factor after timing correction [-].
  exhaust_temp_scale_min: 0.75
  # Maximum exhaust-temperature scale factor after timing correction [-].
  exhaust_temp_scale_max: 1.70
  # Lower clamp for the timing-corrected exhaust temperature [K].
  exhaust_temp_min_k: 500.0
  # Upper clamp for the timing-corrected exhaust temperature [K].
  exhaust_temp_max_k: 1900.0
  # Constant offset in the nonlinear throttle-command to area mapping [-].
  throttle_area_offset: 0.005
  # Main gain in the nonlinear throttle-command to area mapping [-].
  throttle_area_gain: 0.98
  # Exponent in the nonlinear throttle-command to area mapping [-].
  throttle_area_exponent: 1.8
  # Minimum fraction of maximum area that the throttle model is allowed to produce [-].
  throttle_area_min_scale: 0.005
  # Discharge coefficient of the throttle orifice [-].
  throttle_discharge_coeff: 0.82
  # Discharge coefficient of the tailpipe orifice [-].
  tailpipe_discharge_coeff: 0.87
  # Lower clamp on normalized load p_im / p_amb used in reduced-order submodels [-].
  load_min: 0.20
  # Upper clamp on normalized load p_im / p_amb used in reduced-order submodels [-].
  load_max: 1.20
  # Base start of combustion angle before ignition and VVT adjustments [degCA].
  burn_start_base_deg: 360.0
  # Intake-VVT sensitivity of start-of-combustion timing [degCA per deg VVT].
  burn_start_vvt_intake_coeff: 0.08
  # Base burn duration used in the Wiebe heat-release model [degCA].
  burn_duration_base_deg: 66.0
  # Burn-duration reduction with increasing throttle opening [degCA per throttle unit].
  burn_duration_throttle_coeff: 8.0
  # Minimum allowed burn duration [degCA].
  burn_duration_min_deg: 38.0
  # Maximum allowed burn duration [degCA].
  burn_duration_max_deg: 75.0
  # Wiebe-shape coefficient a [-].
  wiebe_a: 5.2
  # Wiebe-shape coefficient m [-].
  wiebe_m: 2.0
  # Base lambda command at nearly closed throttle [-].
  lambda_base: 1.15
  # Lambda enrichment gain with throttle opening [-].
  lambda_throttle_coeff: 0.35
  # Minimum allowed lambda [-].
  lambda_min: 0.82
  # Maximum allowed lambda [-].
  lambda_max: 1.12
  # Stoichiometric air-fuel ratio by mass [kg air / kg fuel].
  stoich_afr: 14.7
  # Offset term in the reduced-order thermal-efficiency map [-].
  eta_base_offset: 0.172
  # Load gain in the reduced-order thermal-efficiency map [-].
  eta_load_coeff: 0.215
  # Absolute RPM penalty coefficient in the reduced-order thermal-efficiency map [1/rpm].
  eta_rpm_abs_coeff: 0.000011
  # Reference RPM for the reduced-order thermal-efficiency map [rpm].
  eta_rpm_reference: 2500.0
  # Lower clamp on the base thermal-efficiency map output [-].
  eta_base_min: 0.08
  # Upper clamp on the base thermal-efficiency map output [-].
  eta_base_max: 0.40
  # Lower clamp on final thermal efficiency after timing correction [-].
  eta_min: 0.02
  # Upper clamp on final thermal efficiency after timing correction [-].
  eta_max: 0.44
  # Minimum RPM required before combustion may be enabled [rpm].
  combustion_enable_rpm_min: 120.0
  # Minimum intake pressure required before combustion may be enabled [Pa].
  combustion_enable_intake_pressure_min_pa: 25000.0
  # RPM threshold above which combustion may continue without starter support [rpm].
  combustion_enable_running_rpm_min: 450.0
  # Upper clamp on normalized combustion-rate output from the Wiebe model [-].
  combustion_rate_max: 5.5
  # Lower clamp on pumping torque [Nm].
  pumping_torque_min_nm: -12.0
  # Upper clamp on pumping torque [Nm].
  pumping_torque_max_nm: 25.0
  # First-order throttle-actuator time constant [s].
  throttle_time_constant_s: 0.060
  # Minimum allowed intake-manifold pressure state [Pa].
  intake_pressure_min_pa: 18000.0
  # Maximum allowed intake-manifold pressure state [Pa].
  intake_pressure_max_pa: 130000.0
  # Minimum exhaust pressure as a fraction of ambient pressure [-].
  exhaust_pressure_min_ambient_ratio: 0.78
  # Maximum exhaust overpressure above ambient [Pa].
  exhaust_pressure_max_over_ambient_pa: 120000.0
  # RPM at which the running flag is latched true when spark and fuel are on [rpm].
  running_set_rpm: 520.0
  # RPM below which the running flag is cleared if the starter is off [rpm].
  running_clear_rpm: 260.0
  # Number of completed cycles used to smooth displayed net torque [-].
  net_torque_smoothing_cycles: 4
  # Time constant of the displayed net-torque low-pass filter [s].
  net_torque_filter_time_constant_s: 0.180
  # Fuel-per-cycle threshold below which combustion is treated as absent [kg].
  fuel_mass_presence_threshold_kg: 1.0e-9
  # Exponent used for the compression-only p-V peak estimate [-].
  compression_peak_gamma: 1.32
  # Upper clamp on the compression-only p-V peak estimate [Pa].
  compression_peak_max_pa: 6.0e6
  # Gain from per-cycle fuel heat into the displayed p-V combustion pressure rise [-].
  combustion_pressure_gain: 0.62
  # Load exponent used in the displayed p-V combustion pressure rise model [-].
  combustion_pressure_load_exponent: 2.5
  # Absolute upper clamp on displayed peak cylinder pressure [Pa].
  peak_pressure_max_pa: 8.0e6
  # Lower guard on swept volume when converting sampled p-V loops into work [m^3].
  swept_volume_floor_sampling_m3: 1.0e-6
  # Lower guard on clearance volume used in the p-V reconstruction model [m^3].
  clearance_volume_floor_m3: 1.0e-6
  # Minimum denominator used when evaluating r - 1 in compression-ratio formulas [-].
  compression_ratio_guard: 1.0
  # Number of recent completed cycles used for indicated-efficiency averaging [-].
  eta_indicated_average_cycles: 3
  # Lower clamp on displayed indicated efficiency from the p-V loop [-].
  eta_indicated_min: -0.20
  # Upper clamp on displayed indicated efficiency from the p-V loop [-].
  eta_indicated_max: 0.44
  # Lower guard on swept volume when computing IMEP [m^3].
  imep_swept_volume_floor_m3: 1.0e-9
  # RPM band around target used to declare stable idle [rpm].
  stable_idle_rpm_band: 90.0
  # Maximum throttle command allowed while declaring stable idle [-].
  stable_idle_throttle_max: 0.20
  # Lower guard on compression ratio in theoretical Otto-efficiency calculation [-].
  theoretical_efficiency_compression_floor: 1.001
  # Number of points generated for the cam-profile plot [-].
  cam_profile_samples: 721
  # Minimum half-duration allowed for the synthetic cam-lobe shape [degCA].
  cam_half_duration_min_deg: 1.0
  # Exponent shaping the synthetic cosine cam-lobe profile [-].
  cam_shape_exponent: 1.2
  # Reduced-order volumetric-efficiency model coefficients.
  volumetric_efficiency:
    # Baseline volumetric efficiency away from the RPM sweet spot [-].
    rpm_base: 0.82
    # Gaussian bump magnitude near the tuned RPM center [-].
    rpm_gain: 0.24
    # RPM center of the volumetric-efficiency Gaussian bump [rpm].
    rpm_center: 5100.0
    # Width parameter of the volumetric-efficiency Gaussian bump [rpm^2].
    rpm_width: 10500000.0
    # Lower clamp on the RPM-dependent VE factor [-].
    rpm_min: 0.62
    # Upper clamp on the RPM-dependent VE factor [-].
    rpm_max: 1.04
    # Intake-VVT sensitivity of VE [- per deg].
    vvt_intake_coeff: 0.0022
    # Exhaust-VVT sensitivity of VE [- per deg].
    vvt_exhaust_coeff: 0.0016
    # Baseline throttle contribution to VE at very low opening [-].
    throttle_base: 0.38
    # Additional throttle contribution to VE as opening increases [-].
    throttle_gain: 0.62
    # Lower clamp on the throttle-dependent VE factor [-].
    throttle_min: 0.38
    # Upper clamp on the throttle-dependent VE factor [-].
    throttle_max: 1.03
    # Lower clamp on total VE after all multipliers [-].
    overall_min: 0.30
    # Upper clamp on total VE after all multipliers [-].
    overall_max: 1.10
  # Starter-motor torque map.
  starter_torque:
    # RPM threshold separating the low-speed starter torque plateau [rpm].
    low_rpm_threshold: 220.0
    # RPM threshold above which starter torque drops to zero [rpm].
    high_rpm_threshold: 450.0
    # Starter torque while below the low-RPM threshold [Nm].
    low_torque_nm: 62.0
    # Starter torque on the mid-RPM plateau before cutout [Nm].
    high_torque_nm: 36.0
  # Display-only p-V reconstruction coefficients.
  pv_model:
    # Polytropic exponent used during the compression stroke [-].
    gamma_compression: 1.34
    # Polytropic exponent used during the expansion stroke [-].
    gamma_expansion: 1.24
    # Exhaust-valve opening angle used in the displayed blowdown model [degCA].
    evo_deg: 565.0
    # End angle of the displayed blowdown transition into exhaust pressure [degCA].
    blowdown_end_deg: 620.0
    # Small intake-stroke pressure pulsation amplitude in the displayed p-V loop [-].
    intake_pulsation_amplitude: 0.02
    # Minimum pressure during power expansion expressed as a multiple of exhaust pressure [-].
    expansion_floor_exhaust_ratio: 1.05
    # Absolute minimum displayed cylinder pressure [Pa].
    pressure_floor_pa: 20000.0
  # Two-volume intake/exhaust gas-path model coefficients.
  gas_path:
    # Intake-side runner inertance converting plenum-runner pressure difference into flow acceleration [Pa s^2 / kg].
    intake_runner_inertance_pa_s2_per_kg: 18000.0
    # Exhaust-side runner inertance converting runner-collector pressure difference into flow acceleration [Pa s^2 / kg].
    exhaust_runner_inertance_pa_s2_per_kg: 14000.0
    # Linear damping applied to the intake runner flow state [1/s].
    intake_runner_damping_per_s: 6.0
    # Linear damping applied to the exhaust runner flow state [1/s].
    exhaust_runner_damping_per_s: 6.0
    # Effective intake runner length used to geometry-scale inertance and friction losses [m].
    intake_runner_length_m: 0.36
    # Effective exhaust primary/header length used to geometry-scale inertance and friction losses [m].
    exhaust_runner_length_m: 0.74
    # Effective hydraulic diameter of the intake runner / port [m].
    intake_runner_diameter_m: 0.034
    # Effective hydraulic diameter of the exhaust primary/header [m].
    exhaust_runner_diameter_m: 0.036
    # Darcy friction factor used in the intake runner pressure-loss model [-].
    intake_runner_friction_factor: 0.028
    # Darcy friction factor used in the exhaust primary pressure-loss model [-].
    exhaust_runner_friction_factor: 0.030
    # Lumped intake-side local-loss coefficient for plenum entry, bends, and port contraction [-].
    intake_runner_local_loss_coeff: 1.6
    # Lumped exhaust-side local-loss coefficient for valve blowdown entry, bends, and collector merge [-].
    exhaust_runner_local_loss_coeff: 1.9
    # Blend factor from mean flow to intake valve-event pulsation; 0 disables pulsation and 1 uses full normalized lift weighting [-].
    intake_pulse_blend: 0.32
    # Blend factor from mean flow to exhaust valve-event pulsation; 0 disables pulsation and 1 uses full normalized lift weighting [-].
    exhaust_pulse_blend: 0.40
    # Weight of intake-runner pressure in the effective cylinder-side intake boundary pressure; the remainder comes from the intake plenum [-].
    intake_boundary_runner_weight: 0.35
    # Weight of exhaust-runner pressure in the effective cylinder-side exhaust boundary pressure; the remainder comes from the exhaust collector [-].
    exhaust_boundary_runner_weight: 0.45
    # Symmetric clamp applied to the intake/exhaust runner flow states [kg/s].
    runner_flow_limit_kg_s: 0.45
    # Minimum allowed intake/exhaust runner pressure state [Pa].
    runner_pressure_min_pa: 18000.0
    # Maximum allowed intake/exhaust runner pressure state [Pa].
    runner_pressure_max_pa: 320000.0
    # Overlap scavenging gain from runner pressure ratio (p_int_runner - p_exh_runner) / p_amb [-].
    overlap_pressure_coeff: 0.22
    # Overlap scavenging gain from exhaust-runner flow [-].
    overlap_flow_coeff: 0.08
    # Exhaust-runner flow scale corresponding to a unit overlap-flow correction [kg/s].
    overlap_flow_reference_kg_s: 0.08
    # Minimum multiplicative correction applied to base VE by overlap/backflow interaction [-].
    overlap_effect_min: 0.88
    # Maximum multiplicative correction applied to base VE by overlap/scavenging interaction [-].
    overlap_effect_max: 1.12
  # Grouped runner / header wave-action closure layered on top of the two-volume gas-path ODE.
  wave_action:
    # Requested number of independently tuned intake runner groups; runtime snaps this to a divisor of the fixed 4 cylinders [-].
    intake_group_count: 4
    # Requested number of independently tuned exhaust primary/header groups; runtime snaps this to a divisor of the fixed 4 cylinders [-].
    exhaust_group_count: 2
    # Number of past 720 deg cycles retained in the damped wave superposition [-].
    event_memory: 3
    # Effective intake runner acoustic length used in the quarter-wave model [m].
    intake_runner_length_m: 0.36
    # Effective exhaust primary/header acoustic length used in the quarter-wave model [m].
    exhaust_primary_length_m: 0.74
    # Travel-time scale multiplying intake runner length / sound speed; 2.0 approximates a round-trip reflection [-].
    intake_delay_scale: 2.0
    # Travel-time scale multiplying exhaust primary length / sound speed; 2.0 approximates a round-trip reflection [-].
    exhaust_delay_scale: 2.0
    # Exponential decay time of the intake wave packet after its arrival at the valve [s].
    intake_decay_time_s: 0.012
    # Exponential decay time of the exhaust wave packet after its arrival at the valve [s].
    exhaust_decay_time_s: 0.010
    # Gain from normalized intake source-flow amplitude into intake-side wave pressure [ambient-pressure fractions].
    intake_pressure_gain: 0.06
    # Gain from normalized exhaust source-flow amplitude into exhaust-side wave pressure [ambient-pressure fractions].
    exhaust_pressure_gain: 0.08
    # Symmetric clamp on intake-side wave pressure correction at the valve boundary [Pa].
    intake_pressure_limit_pa: 6000.0
    # Symmetric clamp on exhaust-side wave pressure correction at the valve boundary [Pa].
    exhaust_pressure_limit_pa: 9000.0
    # Intake source-flow magnitude corresponding to unit wave amplitude [kg/s].
    intake_flow_reference_kg_s: 0.055
    # Exhaust source-flow magnitude corresponding to unit wave amplitude [kg/s].
    exhaust_flow_reference_kg_s: 0.075
    # Damping ratio of the intake-side Helmholtz-style resonance weighting [-].
    intake_resonance_damping_ratio: 0.24
    # Damping ratio of the exhaust-side Helmholtz-style resonance weighting [-].
    exhaust_resonance_damping_ratio: 0.28
    # Blend from unity toward the intake resonance amplitude multiplier [-].
    intake_resonance_gain_blend: 0.35
    # Blend from unity toward the exhaust resonance amplitude multiplier [-].
    exhaust_resonance_gain_blend: 0.45
    # Lower clamp on resonance-derived gain scaling applied to wave pressure gains [-].
    resonance_gain_min: 0.85
    # Upper clamp on resonance-derived gain scaling applied to wave pressure gains [-].
    resonance_gain_max: 1.65
    # Gain from instantaneous intake wave pressure into the intake valve-event flow multiplier [-].
    intake_flow_wave_gain: 0.0
    # Gain from instantaneous exhaust wave pressure into the exhaust valve-event flow multiplier [-].
    exhaust_flow_wave_gain: 0.0
    # Gain from intake-side pressure recovery near IVC into the ram-effect VE multiplier [-].
    intake_ram_gain: 0.22
    # Gain from intake/exhaust overlap pressure head into the scavenging VE multiplier [-].
    exhaust_scavenge_gain: 0.18
    # Lower clamp on the combined wave-action VE multiplier [-].
    ve_pulse_min: 0.94
    # Upper clamp on the combined wave-action VE multiplier [-].
    ve_pulse_max: 1.08
  # Woschni-inspired single-zone cylinder heat-loss coefficients.
  heat_transfer:
    # Representative wall temperature of the combustion chamber surfaces [K].
    wall_temp_k: 470.0
    # Base heat-transfer coefficient before pressure/temperature/piston-speed scaling [W/m^2/K].
    base_h_w_m2k: 120.0
    # Pressure exponent in the heat-transfer correlation [-].
    pressure_exponent: 0.8
    # Gas-temperature exponent in the heat-transfer correlation [-].
    temperature_exponent: -0.45
    # Mean-piston-speed exponent in the heat-transfer correlation [-].
    piston_speed_exponent: 0.8
    # Reference cylinder pressure used in the heat-transfer correlation [Pa].
    reference_pressure_pa: 1000000.0
    # Reference gas temperature used in the heat-transfer correlation [K].
    reference_temp_k: 1000.0
    # Reference mean piston speed used in the heat-transfer correlation [m/s].
    reference_piston_speed_mps: 10.0
    # Fraction of the adiabatic fuel-energy temperature rise used in the heat-loss driving temperature [-].
    gas_temp_rise_gain: 0.30
    # Upper clamp on the mean-gas-temperature estimate [K].
    gas_temp_max_k: 2800.0
    # Scale factor applied to the simple cylinder-surface-area estimate [-].
    wall_area_scale: 1.0
    # Scale factor converting burn duration into effective heat-transfer exposure time [-].
    duration_scale: 0.85
    # Maximum fraction of per-cycle fuel heat that may be removed by wall heat transfer [-].
    heat_loss_fraction_max: 0.08
    # Exhaust-temperature reduction gain from the heat-loss fraction [-].
    exhaust_temp_cooling_gain: 0.35
  # Fuel-evaporation / charge-cooling model used by the bench fueling modes.
  fuel_evaporation:
    # Effective latent heat of the representative gasoline fuel [J/kg].
    latent_heat_j_per_kg: 350000.0
    # Fraction of the latent heat that actually cools the inducted charge [-].
    charge_cooling_effectiveness: 0.72
    # Lower clamp on the cooled cylinder-charge temperature [K].
    intake_charge_temp_min_k: 255.0
  # Effective cp / gamma closures for fresh charge and burned gas.
  gas_thermo:
    # Representative constant-pressure specific heat of the fresh inducted charge [J/kg/K].
    fresh_cp_j_per_kgk: 1005.0
    # Burned-gas cp at the reference temperature before temperature / EGR corrections [J/kg/K].
    burned_cp_ref_j_per_kgk: 1150.0
    # Reference temperature used by the burned-gas cp correlation [K].
    burned_cp_reference_temp_k: 900.0
    # Slope from burned-gas temperature into cp [J/kg/K^2].
    burned_cp_temp_coeff_j_per_kgk2: 0.12
    # Extra burned-gas cp gain applied as internal EGR fraction rises [J/kg/K].
    burned_cp_egr_coeff_j_per_kgk: 120.0
    # Lower clamp on any gas specific heat used in the reduced-order model [J/kg/K].
    cp_min_j_per_kgk: 950.0
    # Upper clamp on any gas specific heat used in the reduced-order model [J/kg/K].
    cp_max_j_per_kgk: 1450.0
  # Pulsation-driven internal EGR surrogate derived from overlap backflow indicators.
  internal_egr:
    # Residual-gas fraction generated by overlap alone before backflow terms are added [-].
    overlap_base_fraction: 0.010
    # Gain from exhaust-over-intake runner pressure head into internal EGR fraction [-].
    pressure_backflow_gain: 0.12
    # Gain from negative overlap scavenging head into internal EGR fraction [-].
    wave_backflow_gain: 0.10
    # Gain from reverse exhaust-runner flow into internal EGR fraction [-].
    reverse_flow_gain: 0.16
    # Reverse-flow magnitude that normalizes the internal EGR backflow term [kg/s].
    reverse_flow_reference_kg_s: 0.06
    # Lower clamp on the modeled internal EGR fraction [-].
    fraction_min: 0.0
    # Upper clamp on the modeled internal EGR fraction [-].
    fraction_max: 0.18
    # Burn-duration increase applied per unit internal EGR fraction [degCA / fraction].
    burn_duration_gain_deg_per_fraction: 22.0
    # Gain reducing ignition-phase effectiveness as internal EGR rises [-].
    phase_dilution_gain: 0.30
    # Lower clamp on the internal-EGR phase-dilution multiplier [-].
    phase_dilution_min: 0.86
  # External brake / vehicle-load surrogate applied on top of internal friction and pumping.
  external_load:
    # Exponent shaping the user load command into a brake-demand fraction [-].
    command_exponent: 1.20
    # Base resisting torque at full load command before speed-dependent terms [Nm].
    base_torque_nm: 14.0
    # Linear speed-dependent resisting torque coefficient [N m s / rad].
    speed_linear_nms: 0.012
    # Quadratic speed-dependent resisting torque coefficient [N m s^2 / rad^2].
    speed_quadratic_nms2: 0.00018
    # Lower clamp on the commanded external load torque [Nm].
    torque_min_nm: 0.0
    # Upper clamp on the commanded external load torque [Nm].
    torque_max_nm: 220.0

# Numerical-control parameters for timestep selection and error normalization.
numerics:
  # Minimum base timestep admitted by the RPM-linked timestep rule [s].
  rpm_link_base_dt_min_s: 0.00005
  # Minimum idle-speed reference admitted by the RPM-linked timestep rule [rpm].
  rpm_link_idle_rpm_min: 200.0
  # Lower clamp on the target crank-angle advance per integration step [deg/step].
  rpm_link_deg_per_step_min: 1.0
  # Upper clamp on the target crank-angle advance per integration step [deg/step].
  rpm_link_deg_per_step_max: 12.0
  # RPM floor used when converting target crank-angle advance into timestep [rpm].
  rpm_link_rpm_floor: 80.0
  # Minimum local timestep as a multiple of base dt [-].
  rpm_link_dt_min_factor: 0.08
  # Absolute minimum local timestep [s].
  rpm_link_dt_min_floor_s: 0.00005
  # Maximum local timestep as a multiple of base dt [-].
  rpm_link_dt_max_factor: 2.5
  # Absolute maximum local timestep [s].
  rpm_link_dt_max_cap_s: 0.012
  # Bias term in normalized omega error for timestep-quality comparisons [rad/s].
  state_error_omega_bias: 10.0
  # Scale used to normalize crank-angle error in the state-error norm [rad].
  state_error_theta_scale_rad: 0.008726646259971648
  # Bias term in normalized intake-pressure error [Pa].
  state_error_p_intake_bias_pa: 150.0
  # Relative term in normalized intake-pressure error [-].
  state_error_p_intake_rel: 0.01
  # Bias term in normalized intake-runner-pressure error [Pa].
  state_error_p_intake_runner_bias_pa: 150.0
  # Relative term in normalized intake-runner-pressure error [-].
  state_error_p_intake_runner_rel: 0.01
  # Bias term in normalized exhaust-pressure error [Pa].
  state_error_p_exhaust_bias_pa: 180.0
  # Relative term in normalized exhaust-pressure error [-].
  state_error_p_exhaust_rel: 0.01
  # Bias term in normalized exhaust-runner-pressure error [Pa].
  state_error_p_exhaust_runner_bias_pa: 180.0
  # Relative term in normalized exhaust-runner-pressure error [-].
  state_error_p_exhaust_runner_rel: 0.01
  # Scale used to normalize intake-runner-flow error [kg/s].
  state_error_m_dot_intake_runner_scale_kg_s: 0.03
  # Scale used to normalize exhaust-runner-flow error [kg/s].
  state_error_m_dot_exhaust_runner_scale_kg_s: 0.03
  # Scale used to normalize throttle-state error [-].
  state_error_throttle_scale: 0.01
  # Minimum probe timestep used while benchmarking real-time throughput [s].
  realtime_probe_dt_min_s: 1.0e-5
  # Warmup steps discarded before throughput timing starts [-].
  realtime_warmup_steps: 48
  # Timed steps used to estimate wall-clock cost per simulation step [-].
  realtime_sample_steps: 240
  # Safety margin applied to measured wall time when computing the real-time dt floor [-].
  realtime_margin_factor: 1.25
  # Absolute minimum real-time timestep floor [s].
  realtime_floor_min_s: 1.0e-5
  # Maximum real-time floor expressed as a multiple of the probe timestep [-].
  realtime_floor_probe_factor_max: 6.0
  # Minimum fixed-dt headroom ratio required before the dashboard stops adapting dt to RPM [-].
  realtime_fixed_dt_headroom_ratio: 2.5
  # Maximum crank-angle advance allowed per fixed realtime step at engine redline [deg/step].
  realtime_fixed_dt_max_deg_per_step: 12.0

# GUI and plotting behavior.
ui:
  # Minimum base dt the dashboard will accept even if the environment config is smaller [s].
  min_base_dt_s: 0.0002
  # Lower bound of dashboard dt relative to the base dt [-].
  realtime_dt_min_factor: 0.05
  # Upper bound of dashboard dt relative to the base dt [-].
  realtime_dt_max_factor: 3.0
  # Additional upper-bound ratio enforcing max_dt >= factor * min_dt [-].
  realtime_dt_max_over_min_factor: 1.5
  # Throttle increment used by the W / X keyboard shortcuts [-].
  throttle_key_step: 0.01
  # Maximum simulation substeps performed per GUI frame [-].
  max_steps_per_frame: 600
  # First-order smoothing factor applied to dt target changes [-].
  dt_smoothing_factor: 0.25
  # Smallest per-step dt allowed once frame remainders are split [s].
  dt_epsilon_s: 1.0e-6
  # Minimum intake-VVT slider value shown in the GUI [degCA].
  vvt_slider_min_deg: -40.0
  # Maximum intake-VVT slider value shown in the GUI [degCA].
  vvt_slider_max_deg: 40.0
  # Minimum ignition-timing slider value shown in the GUI [deg BTDC].
  ignition_slider_min_deg: -5.0
  # Maximum ignition-timing slider value shown in the GUI [deg BTDC].
  ignition_slider_max_deg: 45.0
  # Standard height used for each plot widget [px].
  plot_height_px: 145.0
  # Height of the main p-V plot placed at the top of the central panel [px].
  pv_plot_height_px: 290.0
  # Standard line width for plot traces [px].
  line_width_px: 2.0
  # Line width used for the cam-plot crank-angle cursor [px].
  crank_line_width_px: 1.0
  # Minimum vertical span enforced on the torque plot [Nm].
  torque_min_span_nm: 10.0
  # Additional headroom added above and below the torque plot span [-].
  torque_margin_ratio: 0.15
  # Absolute minimum torque floor span to avoid a flat plot [Nm].
  torque_floor_abs_nm: 5.0
  # Minimum y-axis maximum for the trapped-air plot [mg/cyl].
  trapped_air_min_y_max_mg: 100.0
  # Headroom ratio applied above the trapped-air history maximum [-].
  trapped_air_headroom_ratio: 1.15
  # Default p-V headroom ratio used when auto-scaling would otherwise clip [unused UI reserve].
  pv_headroom_ratio: 1.08
  # Minimum extra pressure headroom for p-V display calculations [kPa].
  pv_min_headroom_kpa: 100.0
  # Requested GUI repaint rate [Hz].
  repaint_hz: 20
  # Initial application-window width [px]. Sized so the full dashboard fits on a typical FHD desktop.
  window_width_px: 1600.0
  # Initial application-window height [px].
  window_height_px: 1000.0
  # Minimum allowed audio gain forwarded from the GUI into the synthesizer [-].
  audio_gain_floor: 0.1

# Fixed plot ranges and p-V-history sampling density.
plot:
  # Number of historical RPM / torque / trapped-air samples retained for plotting [-].
  rpm_history_capacity: 200
  # Number of completed history cycles retained behind the current partial cycle in the crank-angle RPM / torque / trapped-air plots [-].
  history_recent_cycles: 1
  # Number of recent engine cycles retained in the p-V history [-].
  pv_recent_cycles: 4
  # Number of p-V subsamples inserted for each integration step [-].
  pv_subsamples_per_step: 120
  # Left x-axis limit of the displayed p-V plot in normalized cylinder volume [-].
  pv_x_min: 0.0
  # Right x-axis limit of the displayed p-V plot in normalized cylinder volume [-].
  pv_x_max: 1.15
  # Lower y-axis limit of the displayed p-V plot [kPa].
  pv_y_min_kpa: 0.0
  # Upper y-axis limit of the displayed p-V plot [kPa].
  pv_y_max_kpa: 2500.0

# Automatic bench sweep configuration for torque-vs-RPM curves.
bench:
  # Default bench mixture mode selected in the GUI and on the B shortcut.
  default_mode: rich_charge_cooling
  # Left x-axis limit of the displayed bench torque curve [rpm].
  display_rpm_min: 0.0
  # If true, prepend a synthetic 0 rpm / 0 Nm anchor so the curve starts from standstill [-].
  include_zero_rpm_anchor: true
  # First RPM point of the automatic torque-curve sweep [rpm].
  rpm_start_rpm: 1000.0
  # Last RPM point of the automatic torque-curve sweep [rpm].
  rpm_end_rpm: 6500.0
  # RPM increment between successive torque-curve samples [rpm].
  rpm_step_rpm: 250.0
  # Preconditioning time held at the sweep start RPM before the continuous bench ramp begins [s].
  sweep_warmup_time_s: 0.35
  # Total simulated time used to ramp continuously from start RPM to end RPM [s].
  sweep_duration_s: 4.0
  # Nominal crank-angle advance per accepted step during the continuous sweep [deg/step].
  sweep_integration_deg_per_step: 2.4
  # Stabilization time at each locked-RPM point before averaging [s].
  settle_time_s: 0.45
  # Averaging time used to smooth each locked-RPM bench point [s].
  average_time_s: 0.25
  # Number of crank-angle samples used in the locked-cycle average at each bench point [-].
  locked_cycle_samples: 240
  # Initial intake-pressure guess as a fraction of ambient when a new bench point starts [-].
  initial_map_ratio: 0.95
  # Initial exhaust pressure guess above ambient when a new bench point starts [Pa].
  initial_exhaust_over_ambient_pa: 7000.0
  # Lambda target used by the dedicated stoichiometric bench mode [-].
  lambda_one_target: 1.0
  # Lambda target used by the rich bench mode with charge cooling [-].
  rich_charge_cooling_lambda: 0.88
  # Target crank-angle advance per accepted bench integration step [deg/step].
  integration_deg_per_step: 0.8
  # Lower clamp on the adaptive bench integrator timestep [s].
  integration_dt_min_s: 5.0e-6
  # Upper clamp on the adaptive bench integrator timestep [s].
  integration_dt_max_s: 2.0e-4
  # Normalized local state-error tolerance used by step-doubling in bench mode [-].
  integration_error_tolerance: 0.03
  # Growth factor applied to the next bench timestep after a comfortably accepted step [-].
  integration_dt_growth: 1.25
  # Maximum number of timestep halvings attempted before a bench step is forcibly accepted [-].
  integration_refine_limit: 8
  # Maximum accepted bench integration steps processed per GUI frame [-].
  steps_per_frame: 8000
  # Wall-clock budget spent on bench integration inside one GUI frame [ms].
  frame_time_budget_ms: 18.0
  # Bench-only speed-hold dyno controller and absorber model.
  dyno:
    # Initial normalized absorber command used when a bench point starts [-].
    initial_load_cmd: 0.55
    # Proportional gain driving absorber command from RPM error during speed hold [-/rpm].
    speed_hold_kp: 0.0035
    # Integral gain driving absorber command from accumulated RPM error during speed hold [-/(rpm s)].
    speed_hold_ki: 0.0025
    # Lower clamp on the dyno speed-controller integral state [rpm s].
    integral_min: -220.0
    # Upper clamp on the dyno speed-controller integral state [rpm s].
    integral_max: 220.0
    # Absorber torque model used only by the automatic bench dyno.
    absorber_model:
      # Exponent shaping the dyno control command into absorber demand [-].
      command_exponent: 1.0
      # Base absorber torque available at full command [Nm].
      base_torque_nm: 220.0
      # Linear speed-dependent absorber torque gain [N m s/rad].
      speed_linear_nms: 0.040
      # Quadratic speed-dependent absorber torque gain [N m s^2/rad^2].
      speed_quadratic_nms2: 0.00015
      # Lower clamp on the absorber torque [Nm].
      torque_min_nm: 0.0
      # Upper clamp on the absorber torque [Nm].
      torque_max_nm: 360.0
